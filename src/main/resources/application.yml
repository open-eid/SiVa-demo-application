management:
  health:
    diskspace:
      enabled: false
  endpoints:
    web:
      base-path: /monitoring
      exposure:
        include: health
  endpoint:
    health:
      show-details: "ALWAYS"
      probes:
        enabled: true

server:
  compression:
    enabled: true

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB
      enabled: true
  cache:
    caffeine:
      spec: maximumSize=100,expireAfterAccess=20s

wro4j:
  filterUrl: /owr
  #  cacheName: owr
  managerFactory:
    preProcessors: removeSourceMaps, cssUrlRewriting, cssImport, cssMinJawr, semicolonAppender
